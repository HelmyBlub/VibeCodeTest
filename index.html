<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Game Prototype</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <div id="hud">WASD — move &nbsp;|&nbsp; Space — jump &nbsp;|&nbsp; Q — fireball &nbsp;|&nbsp; Left-drag — camera</div>
    <div id="player-hp">
        HP: <span id="hp-text">100</span>
        <div id="hp-track"><div id="hp-fill"></div></div>
    </div>
    <div id="game-over"><div>YOU DIED</div><span>Refresh to restart</span></div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
