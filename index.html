<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Game Prototype</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <canvas id="renderCanvas"></canvas>

    <div id="hud">WASD — move &nbsp;|&nbsp; Space — jump &nbsp;|&nbsp; Tab — spell creator &nbsp;|&nbsp; Left-drag — camera</div>

    <div id="player-stats">
        <div id="player-hp">
            HP: <span id="hp-text">100</span>
            <div id="hp-track"><div id="hp-fill"></div></div>
        </div>
        <div id="player-mana">
            Mana: <span id="mana-text">100</span>
            <div id="mana-track"><div id="mana-fill"></div></div>
        </div>
    </div>

    <div id="hotbar">
        <div class="hb-slot hb-empty" id="hb-slot-0">
            <span class="hb-key">1</span>
            <div class="hb-icon" id="hb-icon-0"></div>
            <div class="hb-name" id="hb-name-0"></div>
            <div class="hb-cd-overlay" id="hb-cd-0"></div>
            <div class="hb-mana-overlay" id="hb-mana-0"></div>
            <div class="hb-timer" id="hb-timer-0"></div>
        </div>
        <div class="hb-slot hb-empty" id="hb-slot-1">
            <span class="hb-key">2</span>
            <div class="hb-icon" id="hb-icon-1"></div>
            <div class="hb-name" id="hb-name-1"></div>
            <div class="hb-cd-overlay" id="hb-cd-1"></div>
            <div class="hb-mana-overlay" id="hb-mana-1"></div>
            <div class="hb-timer" id="hb-timer-1"></div>
        </div>
        <div class="hb-slot hb-empty" id="hb-slot-2">
            <span class="hb-key">3</span>
            <div class="hb-icon" id="hb-icon-2"></div>
            <div class="hb-name" id="hb-name-2"></div>
            <div class="hb-cd-overlay" id="hb-cd-2"></div>
            <div class="hb-mana-overlay" id="hb-mana-2"></div>
            <div class="hb-timer" id="hb-timer-2"></div>
        </div>
        <div class="hb-slot hb-empty" id="hb-slot-3">
            <span class="hb-key">4</span>
            <div class="hb-icon" id="hb-icon-3"></div>
            <div class="hb-name" id="hb-name-3"></div>
            <div class="hb-cd-overlay" id="hb-cd-3"></div>
            <div class="hb-mana-overlay" id="hb-mana-3"></div>
            <div class="hb-timer" id="hb-timer-3"></div>
        </div>
    </div>

    <div id="cast-bar">
        <div id="cast-bar-label"></div>
        <div id="cast-bar-track"><div id="cast-bar-fill"></div></div>
    </div>

    <div id="spell-creator"></div>

    <div id="game-over"><div>YOU DIED</div><button id="restart-btn" onclick="window.location.reload()">Restart</button></div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
